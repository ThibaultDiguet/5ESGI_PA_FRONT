<div class="flex flex-col items-center justify-center gap-6 p-8">
  <app-icon-spinner [loading]="true" size="48px"/>

  <div class="text-center">
    <p class="text-xl font-semibold text-zinc-900 flex items-center justify-center">
      {{ message() }}
      <span class="inline-flex w-10 justify-start ml-1 text-3xl">
        <span class="animate-bounce [animation-duration:1s]">.</span>
        <span class="animate-bounce [animation-duration:1s] [animation-delay:0.2s]">.</span>
        <span class="animate-bounce [animation-duration:1s] [animation-delay:0.4s]">.</span>
      </span>
    </p>
  </div>
</div>
