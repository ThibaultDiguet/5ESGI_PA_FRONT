<div class="w-full h-full overflow-hidden flex items-center justify-center bg-zinc-50">
  <div class="flex flex-col gap-10 w-3xl m-16">
    <div class="flex flex-col gap-2 text-center">
      <h1 class="text-3xl font-bold text-zinc-900">bienvenue
        chez {{ restaurantConfig.config()?.restaurant?.name }}</h1>
      <p class="text-lg text-zinc-600 font-normal">où souhaitez-vous manger ?</p>
    </div>
    <div class="flex flex-row gap-16 w-full">
      <button (click)="chooseService('dine-in')"
              class="animate-slide-in-top [animation-delay:0.05s] bg-zinc-100 flex-1 aspect-square flex flex-col items-center justify-center rounded-xl shadow-xl">
        <app-icon-dine-in class="text-primary" size="104px"/>
        <div class="flex flex-col gap-2 p-4">
          <h1 class="text-center text-zinc-900 font-semibold text-xl">sur place</h1>
          <p class="text-md text-zinc-600 font-normal text-center">relaxez-vous et profitez de votre repas dans nos
            sièges
            confortables.</p>
        </div>
      </button>

      <button (click)="chooseService('takeaway')"
              class="animate-slide-in-top [animation-delay:0.125s] bg-zinc-100 flex-1 aspect-square flex flex-col items-center justify-center rounded-xl shadow-xl">
        <app-icon-takeaway class="text-primary" size="104px"/>
        <div class="flex flex-col gap-2 p-4">
          <h1 class="text-center text-zinc-900 font-semibold text-xl">à emporter</h1>
          <p class="text-md text-zinc-600 font-normal text-center">récupérez votre commande et savourez votre repas où
            vous le souhaitez.</p>
        </div>
      </button>

    </div>
    <button (click)="terminalOrderStore.stepService.back()" hlmBtn size="xl" variant="link">précédent</button>
  </div>
</div>
