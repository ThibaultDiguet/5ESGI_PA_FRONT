<div
  class="relative w-full h-full overflow-hidden flex items-center justify-center bg-zinc-50 z-51 animate-slide-to-top">
  <div class="flex flex-col w-3xl m-16 gap-6">
    <div class="flex flex-col gap-2 items-center">
      <img alt="logo" class="h-10 w-fit" src="{{restaurantConfigStore.config()!.restaurant.logo}}"/>
      <div class="flex flex-col gap-2 text-center">
        <h1 class="text-3xl font-bold text-zinc-900">on vous apporte votre commande</h1>
        <p class="text-lg text-zinc-600 font-normal">prenez un chevalet et indiquez son numéro ci-dessous</p>
      </div>
    </div>
    <div class="w-3xs mx-auto h-96">
      <app-numeric-keyboard-code (valueChange)="onCodeChange($event)" [hideDigits]="false" [maxDigits]="3"
                                 placeholder="---"/>
    </div>

    <button (click)="saveCode()" animation="pushShine" hlmBtn
            size="xxl" variant="terminalPrimary">
      valider
    </button>
  </div>
</div>
