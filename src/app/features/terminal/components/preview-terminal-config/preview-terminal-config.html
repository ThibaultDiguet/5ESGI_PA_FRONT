@if (config){
  <div class="flex flex-col gap-4 bg-white w-full p-8 rounded-lg sm:w-[400px] sm:border border-input">
    <div class="flex justify-center">
      <img [src]="config.restaurant.logo" alt="restaurant logo" class="h-16" />
    </div>
    <div class="flex flex-col gap-2">
      <h1 class="text-xl sm:text-2xl text-secondary-foreground font-bold">
        {{ config.terminal.name }} - {{ config.restaurant.name }}
      </h1>
      <p class="text-gray-600 text-sm">
        Les informations ci-dessus ont été trouvées. Si elles sont correctes,
        vous pouvez valider la configuration.
      </p>
    </div>
    <div class="flex flex-col gap-2">
      <button (click)="validateConfig()" hlmBtn type="submit">
        Valider
      </button>
      <button (click)="deleteConfig()" hlmBtn type="button" variant="link">
        Retour
      </button>
    </div>
  </div>
}
