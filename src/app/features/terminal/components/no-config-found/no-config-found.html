<div class="w-full h-full flex justify-center items-center">
  <div class="flex flex-col gap-4 bg-white w-full p-8 rounded-lg sm:w-[400px] sm:border border-input">
    <div class="flex justify-center">
      <img alt="restaurant logo" class="h-16" src="assets/icons/logo-borne-appétit.png">
    </div>
    <div class="flex flex-col gap-2">
      <h1 class="text-xl sm:text-2xl text-secondary-foreground font-bold">
       Borne non configurée
      </h1>
      <p class="text-gray-600 text-sm">
        Cette borne n'est pas configuré. Pour pouvoir la configurer, veuillez cliquer sur le bouton ci-dessous.
      </p>
    </div>
    <div class="flex flex-col gap-2">
      <button hlmBtn type="submit" (click)="configTerminal()">
        Configurer la borne
      </button>
    </div>
  </div>
</div>
