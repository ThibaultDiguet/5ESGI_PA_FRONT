@if (config){
  <div class="flex flex-col gap-4 bg-white w-full p-8 rounded-lg sm:w-[400px] sm:border border-input">
    <div class="flex justify-center">
      <img [src]="config.restaurant.logo" alt="restaurant logo" class="h-16" />
    </div>
    <div class="flex flex-col gap-2">
      <h1 class="text-xl sm:text-2xl text-secondary-foreground font-bold">
        {{ config.terminal.name }} - {{ config.restaurant.name }}
      </h1>
      <p class="text-gray-600 text-sm">
        Une configuration est déjà présente pour cette borne. Vous pouvez la synchroniser pour récupérer la dernière configuration ou supprimer cette configuration.
      </p>
    </div>
    <div class="flex flex-col gap-2">
      <button (click)="syncConfig()" hlmBtn type="button">
        Synchroniser avec la base de données
      </button>
      <button (click)="removeConfig()" hlmBtn type="button" variant="link">
        Supprimer la configuration
      </button>
    </div>
  </div>
}
