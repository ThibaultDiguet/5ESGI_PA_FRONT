<div class="w-full h-full overflow-hidden flex items-center justify-center bg-zinc-50">
  <div class="flex flex-col w-3xl m-16 gap-6">
    <div class="flex flex-col gap-2 text-center">
      <h1 class="text-3xl font-bold text-zinc-900">scannez votre carte</h1>
      <p class="text-lg text-zinc-600 font-normal">présentez le QR code de votre application devant le lecteur situé
        sous l'écran</p>
    </div>

    <div class="mx-auto w-full h-96">
      <app-qr-code-scanner-lottie/>
    </div>

    <div class="flex flex-col gap-2">
      <button (click)="terminalOrderStore.stepService.setAuthentificationMethodToCode()" hlmBtn size="xxl">
        saisir mon code manuellement
      </button>
      <button (click)="terminalOrderStore.stepService.next()" hlmBtn size="xxl" variant="tertiary">
        continuer sans compte
      </button>
    </div>
  </div>
</div>
