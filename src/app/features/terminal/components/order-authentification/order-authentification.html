<div class="w-full h-full overflow-hidden flex items-center justify-center bg-zinc-50">
  <div class="flex flex-col gap-10 w-3xl m-16">
    <div class="flex flex-col gap-2 text-center">
      <h1 class="text-3xl font-bold text-zinc-900">identifiez-vous</h1>
      <p class="text-lg text-zinc-600 font-normal">scannez votre carte de fidélité ou saisissez votre code pour profiter
        de vos avantages</p>
    </div>
    <div class="flex flex-row gap-16 w-full">
      <button
        (click)="stepService.setAuthentificationMethodToScan()"
        class="animate-slide-in-top [animation-delay:0.05s] bg-zinc-100 flex-1 aspect-square flex flex-col items-center justify-center rounded-xl shadow-lg">
        <app-icon-qr-scan class="text-primary" size="104px"/>
        <div class="flex flex-col gap-2 p-4">
          <h1 class="text-center text-zinc-900 font-semibold text-xl">scanner ma carte</h1>
          <p class="text-md text-zinc-600 font-normal text-center">scannez votre QR code pour vous
            identifier instantanément.</p>
        </div>
      </button>

      <button
        (click)="stepService.setAuthentificationMethodToCode()"
        class="animate-slide-in-top [animation-delay:0.125s] bg-primary flex-1 aspect-square flex flex-col items-center justify-center rounded-xl shadow-xl"
      >
        <app-icon-code-entry class="text-zinc-50" size="104px"/>
        <div class="flex flex-col gap-2 p-4">
          <h1 class="text-center text-zinc-100 font-semibold text-xl">saisir mon code</h1>
          <p class="text-md text-zinc-50 font-normal text-center">tapez manuellement votre code de fidélité à l’aide du
            pavé numérique.</p>
        </div>
      </button>
    </div>

    <div
      class="w-full animate-slide-in-top [animation-delay:0.10s] bg-zinc-100 flex flex-row items-center p-4 gap-6 rounded-xl shadow-lg">
      <div class="shadow-inner flex-shrink-0">
        <qrcode
          [colorDark]="'#18181b'"
          [colorLight]="'#ffffff'"
          [errorCorrectionLevel]="'M'"
          [margin]="0"
          [qrdata]="registrationUrl()"
          [width]="80"/>
      </div>

      <div class="flex flex-col text-left">
        <p class="text-lg font-semibold text-zinc-900 leading-tight">pas encore de compte ?</p>
        <p class="text-sm text-zinc-600 font-normal">scannez ce QR code pour en créer un instantanément.</p>
      </div>

    </div>

    <div class="flex flex-col gap-2">
      <button (click)="stepService.next()"
              animation="pushShine"
              hlmBtn
              size="xxl"
              variant="terminalPrimary"
      >
        continuer sans compte
      </button>
      <button (click)="stepService.reset()" animation="pushShine" hlmBtn size="xxl"
              variant="terminalTertiary">
        abandonner la commande
      </button>
    </div>
  </div>
</div>
