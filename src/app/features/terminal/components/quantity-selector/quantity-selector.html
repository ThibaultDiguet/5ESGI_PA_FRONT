<div class="flex items-center gap-2 p-1 border border-zinc-200 rounded-full bg-white shadow-inner w-fit">

  <button
    (click)="decrement()"
    [disabled]="value() <= min()"
    hlmBtn
    size="icon"
    variant="terminalTertiary">
    <ng-icon class="text-zinc-600" name="lucideMinus" size="30"/>
    <span class="sr-only">diminuer la quantité</span>
  </button>

  <span class="w-12 text-center text-2xl font-bold text-zinc-900 tabular-nums">
        {{ value() }}
      </span>

  <button
    (click)="increment()"
    [disabled]="value() >= max()"
    hlmBtn
    size="icon"
    variant="terminalPrimary">
    <ng-icon class="text-zinc-600" name="lucidePlus" size="30"/>
    <span class="sr-only">augmenter la quantité</span>
  </button>
</div>
