@if (loyaltyCode.length === loyaltyCodeDigits) {
  <div class="absolute w-full h-full overflow-hidden">
    <app-order-authentification-login [loyaltyCode]="loyaltyCode"/>
  </div>
}

<div class="w-full h-full overflow-hidden flex items-center justify-center bg-zinc-50">
  <div class="flex flex-col w-3xl m-16 gap-6">
    <div class="flex flex-col gap-2 text-center">
      <h1 class="text-3xl font-bold text-zinc-900">saisissez votre code</h1>
      <p class="text-lg text-zinc-600 font-normal">tapez les chiffres de votre code de fidélité à l'aide du pavé
        numérique</p>
    </div>

    <div class="w-3xs mx-auto h-96">
      <app-numeric-keyboard-code (valueChange)="onCodeChange($event)" [maxDigits]="loyaltyCodeDigits"
                                 placeholder="--------"/>
    </div>

    <div class="flex flex-col gap-2">
      <button (click)="stepService.setAuthentificationMethodToScan()" animation="pushShine" hlmBtn
              size="xxl" variant="terminalPrimary">
        scanner ma carte
      </button>
      <button (click)="stepService.next()" animation="pushShine" hlmBtn size="xxl"
              variant="terminalTertiary">
        continuer sans compte
      </button>
    </div>
  </div>
</div>
