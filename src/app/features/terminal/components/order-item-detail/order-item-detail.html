@if (item(); as data) {
  <div class="flex flex-col h-full bg-zinc-50">
    <div class="overflow-hidden h-full">
      <img [src]="data.imageUrl" alt="image" class="w-full h-full object-cover "/>
    </div>

    <div class="px-4 pt-4 flex flex-col gap-2">
      <div class="flex flex-col">
        <div class="flex justify-between items-start">
          <h2 class="text-2xl font-extrabold text-zinc-900">{{ data.name }}</h2>
          <span class="text-2xl font-bold text-primary">{{ data.price | currency:'EUR' }}</span>
        </div>
        <p class="text-lg text-zinc-600 font-normal leading-relaxed">{{ data.description }}</p>
      </div>
      @if (data.allergens !== 'NA') {
        <p class="text-sm text-zinc-600 font-normal leading-relaxed">{{ data.allergens }}</p>
      }
      @if (data.nutritionalValues !== 'NA') {
        <p class="text-sm text-zinc-600 font-light leading-relaxed">{{ data.nutritionalValues }}</p>
      }
    </div>
  </div>
}
